<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Entry Sheet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="sidebar" class="sidebar"></div>

    <main class="main-content">
        <div class="page-header">
            <div>
                <h1 id="page-title">Loading...</h1>
            </div>
            <div style="display:flex; gap:0.5rem; align-items:center;">
                <a href="index.html" class="btn">Back to Dashboard</a>
                <button id="btn-export" class="btn"
                    style="display:flex; align-items:center; gap:0.4rem; background:rgba(255,255,255,0.8);">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                    Export
                </button>
                <button id="btn-save" class="btn btn-primary">Entry Update</button>
            </div>
        </div>

        <div id="report-container"></div>
    </main>

    <!-- Firebase App (the core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <!-- Firebase Realtime Database -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const pageId = urlParams.get('page') || 'anik'; // fallback
            renderEntryPage(pageId);
        });
    </script>
</body>

</html>
