      <stop offset="0.52" stop-color="#f59e0b" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="130" y1="112" x2="386" y2="410" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff7cc"/>
