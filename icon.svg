<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.55" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="bladeShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#1e1b4b" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="hub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background tile -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="url(#glow)"/>

  <!-- Ambient outer ring (attendance dots) -->
  <g opacity="0.35">
    <circle cx="256" cy="72"  r="5" fill="#ffffff"/>
    <circle cx="340" cy="92"  r="4" fill="#ffffff"/>
    <circle cx="412" cy="148" r="4" fill="#ffffff"/>
    <circle cx="448" cy="232" r="5" fill="#ffffff"/>
    <circle cx="440" cy="320" r="4" fill="#ffffff"/>
    <circle cx="388" cy="396" r="4" fill="#ffffff"/>
    <circle cx="304" cy="440" r="5" fill="#ffffff"/>
    <circle cx="208" cy="440" r="4" fill="#ffffff"/>
    <circle cx="124" cy="396" r="4" fill="#ffffff"/>
    <circle cx="72"  cy="320" r="5" fill="#ffffff"/>
    <circle cx="64"  cy="232" r="4" fill="#ffffff"/>
    <circle cx="100" cy="148" r="4" fill="#ffffff"/>
    <circle cx="172" cy="92"  r="5" fill="#ffffff"/>
  </g>

  <!-- Ceiling fan: 3 blades -->
  <g transform="translate(256 256)" filter="url(#softShadow)">
    <!-- Blade template: long tear-drop sweeping clockwise -->
    <g>
      <path d="M -8 -22 C 40 -60 110 -80 170 -56 C 178 -40 170 -20 150 -10 C 90 8 30 6 -8 4 Z"
            fill="url(#blade)"/>
      <path d="M -8 -22 C 40 -60 110 -80 170 -56 C 178 -40 170 -20 150 -10 C 90 8 30 6 -8 4 Z"
            fill="url(#bladeShade)"/>
    </g>
    <g transform="rotate(120)">
      <path d="M -8 -22 C 40 -60 110 -80 170 -56 C 178 -40 170 -20 150 -10 C 90 8 30 6 -8 4 Z"
            fill="url(#blade)"/>
      <path d="M -8 -22 C 40 -60 110 -80 170 -56 C 178 -40 170 -20 150 -10 C 90 8 30 6 -8 4 Z"
            fill="url(#bladeShade)"/>
    </g>
    <g transform="rotate(240)">
      <path d="M -8 -22 C 40 -60 110 -80 170 -56 C 178 -40 170 -20 150 -10 C 90 8 30 6 -8 4 Z"
            fill="url(#blade)"/>
      <path d="M -8 -22 C 40 -60 110 -80 170 -56 C 178 -40 170 -20 150 -10 C 90 8 30 6 -8 4 Z"
            fill="url(#bladeShade)"/>
    </g>

    <!-- Central motor housing -->
    <circle cx="0" cy="0" r="46" fill="#1e1b4b"/>
    <circle cx="0" cy="0" r="46" fill="url(#glow)" opacity="0.6"/>
    <circle cx="0" cy="0" r="30" fill="url(#hub)"/>
    <circle cx="0" cy="0" r="8" fill="#1e1b4b"/>
  </g>

  <!-- Attendance check badge (bottom-right pill) -->
  <g transform="translate(352 388)">
    <circle cx="50" cy="50" r="54" fill="#ffffff" opacity="0.96"/>
    <circle cx="50" cy="50" r="54" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.6"/>
    <path d="M 28 52 L 44 68 L 74 34" stroke="#10b981" stroke-width="10"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <g>
    <text x="256" y="86" font-family="'Plus Jakarta Sans', 'Inter', Arial, sans-serif"
          font-size="28" font-weight="900" text-anchor="middle"
          fill="#ffffff" letter-spacing="6" opacity="0.92">MEP FAN LTD.</text>
  </g>
</svg>
