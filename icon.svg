<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">MEP Fan Attendance premium logo</title>
  <desc id="desc">A luxury black and gold fan emblem with an attendance checkmark badge.</desc>
  <defs>
    <linearGradient id="tile" x1="72" y1="34" x2="440" y2="478" gradientUnits="userSpaceOnUse">
