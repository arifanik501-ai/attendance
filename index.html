<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#eab308">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Fan Attendance</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=105">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
</head>

<body style="opacity:0; transform: translate3d(14px, 0, 0); transition: opacity var(--motion-slow, 0.32s) cubic-bezier(0.2, 0.8, 0.2, 1), transform var(--motion-slow, 0.32s) cubic-bezier(0.2, 0.8, 0.2, 1);">
  <!-- Mobile Hamburger Menu Button -->
  <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="Toggle Menu">
    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path></svg>
  </button>
  
  <!-- Mobile Sidebar Overlay Backdrop -->
  <div id="mobile-sidebar-overlay" class="mobile-sidebar-overlay"></div>

  <div id="sidebar" class="sidebar"></div>

  <main class="main-content">


    <div id="dashboard-container"></div>
  </main>

  <!-- Firebase App (the core Firebase SDK) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <!-- Firebase Realtime Database -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="app.js?v=105"></script>
  <script src="tooltip.js?v=105" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Mobile Menu Logic
      const mobileBtn = document.getElementById('mobile-menu-btn');
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('mobile-sidebar-overlay');

      function toggleMobileMenu() {
        sidebar.classList.toggle('mobile-open');
        overlay.classList.toggle('mobile-open');
      }

      if(mobileBtn) mobileBtn.addEventListener('click', toggleMobileMenu);
      if(overlay) overlay.addEventListener('click', toggleMobileMenu);

      // Close sidebar when clicking a nav link on mobile (except the Entry Sheet toggle)
      document.body.addEventListener('click', (e) => {
        const navLink = e.target.closest('.nav-link');
        if (window.innerWidth <= 768 && navLink && !navLink.classList.contains('entry-sheet-toggle')) {
          sidebar.classList.remove('mobile-open');
          overlay.classList.remove('mobile-open');
        }
      });

      renderDashboard();
      window.addEventListener('hashchange', () => {
        if (window.location.hash === '#overtime-dashboard' && window.resetOvertimeDashboardPeriodOffset) {
          window.resetOvertimeDashboardPeriodOffset();
        }
        if (window.location.hash === '#iom-dashboard' && window.resetIomDashboardPeriodOffset) {
          window.resetIomDashboardPeriodOffset();
        }
        renderDashboard();
      });
      const reveal = () => {
        document.body.style.opacity = '1';
        document.body.style.transform = 'none';
      };
      requestAnimationFrame(() => requestAnimationFrame(reveal));
    });
  </script>
</body>

</html>
